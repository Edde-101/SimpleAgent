# 技能市场配置
# 加新市场只需追加条目，无需改代码

marketplaces:
  - name: github
    type: github
    search_url: https://api.github.com/search/repositories
    detail_url: https://api.github.com/repos
    query_param: q
    # api_key: ${GITHUB_TOKEN}

  - name: clawhub
    type: rest
    search_url: https://clawhub.ai/api/v1/search
    detail_url: https://clawhub.ai/api/v1/skills
    query_param: q
    # 认证: GitHub OAuth (clawhub login)

  - name: skills.sh
    type: rest
    search_url: https://skills.sh/api/skills
    detail_url: https://skills.sh/api/skills
    query_param: query
    # 无需认证即可搜索

  - name: skillmap
    type: rest
    search_url: https://skillsmp.com/api/v1/skills/search
    detail_url: null
    query_param: q
    # 匿名: 50次/天, 认证: 500次/天
    # api_key: ${SKILLMAP_TOKEN}  # Authorization: Bearer xxx
